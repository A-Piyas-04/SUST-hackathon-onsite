<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Multi-Provider Agent Liquidity and Coordination Platform architecture</title>
  <desc id="desc">Role-aware Next.js frontend connects to a FastAPI modular monolith. Synthetic provider feeds enter normalization and a separated ledger, then quality, liquidity, and unusual-activity analysis produce explainable alerts and human cases stored in PostgreSQL with RLS, audit, and validation.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.band{fill:#0f172a}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:2}.soft{fill:#eef2ff;stroke:#a5b4fc;stroke-width:2}.cash{fill:#ecfdf5;stroke:#10b981;stroke-width:2}.provider{fill:#fff7ed;stroke:#f97316;stroke-width:2}.flow{fill:#fdf2f8;stroke:#ec4899;stroke-width:2}.evidence{fill:#eff6ff;stroke:#3b82f6;stroke-width:2}.title{font:700 30px Arial,sans-serif;fill:#fff}.subtitle{font:400 16px Arial,sans-serif;fill:#cbd5e1}.h{font:700 18px Arial,sans-serif;fill:#0f172a}.t{font:400 14px Arial,sans-serif;fill:#334155}.small{font:600 12px Arial,sans-serif;fill:#475569}.arrow{stroke:#64748b;stroke-width:3;fill:none;marker-end:url(#arrow)}.pink{stroke:#db2777;stroke-width:3;fill:none;marker-end:url(#arrowPink)}.dash{stroke:#94a3b8;stroke-width:2;stroke-dasharray:7 6;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker>
    <marker id="arrowPink" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#db2777"/></marker>
  </defs>
  <rect class="bg" width="1400" height="900"/>
  <rect class="band" x="0" y="0" width="1400" height="92"/>
  <text class="title" x="52" y="43">Multi-Provider Agent Liquidity &amp; Coordination Platform</text>
  <text class="subtitle" x="52" y="70">Synthetic data → evidence-aware analytics → provider-safe human coordination</text>

  <rect class="panel" x="52" y="125" rx="10" width="250" height="150"/>
  <text class="h" x="74" y="158">Role-aware interfaces</text>
  <text class="t" x="74" y="188">Next.js 16 / React 19</text>
  <text class="t" x="74" y="214">Agent · Provider Ops · Risk</text>
  <text class="t" x="74" y="240">Management · Admin</text>
  <text class="small" x="74" y="262">Same-origin API proxy</text>

  <rect class="soft" x="360" y="125" rx="10" width="980" height="150"/>
  <text class="h" x="382" y="158">FastAPI modular monolith</text>
  <rect class="panel" x="382" y="177" rx="7" width="170" height="68"/>
  <text class="small" x="397" y="201">REST / OpenAPI</text><text class="t" x="397" y="225">request IDs · errors</text>
  <rect class="panel" x="570" y="177" rx="7" width="170" height="68"/>
  <text class="small" x="585" y="201">Authentication</text><text class="t" x="585" y="225">role + scope checks</text>
  <rect class="panel" x="758" y="177" rx="7" width="170" height="68"/>
  <text class="small" x="773" y="201">Domain services</text><text class="t" x="773" y="225">transactional writes</text>
  <rect class="panel" x="946" y="177" rx="7" width="170" height="68"/>
  <text class="small" x="961" y="201">Observability</text><text class="t" x="961" y="225">health · metrics · logs</text>
  <rect class="panel" x="1134" y="177" rx="7" width="182" height="68"/>
  <text class="small" x="1149" y="201">Validation</text><text class="t" x="1149" y="225">labels · evidence</text>

  <path class="arrow" d="M302 200 L360 200"/>

  <rect class="provider" x="52" y="330" rx="10" width="250" height="220"/>
  <text class="h" x="74" y="365">Synthetic provider feeds</text>
  <text class="t" x="74" y="398">bKash events</text>
  <text class="t" x="74" y="428">Nagad events</text>
  <text class="t" x="74" y="458">Rocket events</text>
  <line x1="74" y1="477" x2="280" y2="477" stroke="#fdba74" stroke-width="2"/>
  <text class="small" x="74" y="504">Faults</text>
  <text class="t" x="74" y="528">delay · missing · malformed · conflict</text>

  <rect class="panel" x="360" y="330" rx="10" width="230" height="95"/>
  <text class="h" x="382" y="365">Normalize &amp; ingest</text>
  <text class="t" x="382" y="394">validate · reject safely</text>

  <rect class="panel" x="360" y="455" rx="10" width="230" height="155"/>
  <text class="h" x="382" y="489">Separated ledger</text>
  <rect class="cash" x="382" y="510" rx="6" width="186" height="34"/>
  <text class="small" x="397" y="532">Shared physical cash</text>
  <rect class="provider" x="382" y="552" rx="6" width="186" height="34"/>
  <text class="small" x="397" y="574">Provider-specific e-money</text>
  <text class="small" x="382" y="602">Never summed or converted</text>

  <path class="arrow" d="M302 405 L360 377"/>
  <path class="arrow" d="M475 425 L475 455"/>

  <rect class="evidence" x="650" y="330" rx="10" width="250" height="115"/>
  <text class="h" x="672" y="365">Quality &amp; confidence</text>
  <text class="t" x="672" y="394">fresh · stale · missing · conflicting</text>
  <text class="small" x="672" y="420">suppression and safe fallback</text>

  <rect class="cash" x="650" y="475" rx="10" width="250" height="125"/>
  <text class="h" x="672" y="510">Liquidity forecast</text>
  <text class="t" x="672" y="539">burn rate · shortage time</text>
  <text class="t" x="672" y="565">bounds · samples · signals</text>
  <text class="small" x="672" y="588">one reserve at a time</text>

  <rect class="provider" x="950" y="330" rx="10" width="280" height="270"/>
  <text class="h" x="972" y="365">Unusual-activity analysis</text>
  <text class="t" x="972" y="398">Near-identical amounts</text>
  <text class="t" x="972" y="428">Velocity spike</text>
  <text class="t" x="972" y="458">Balance inconsistency</text>
  <text class="t" x="972" y="488">Behavioral k-NN distance</text>
  <line x1="972" y1="508" x2="1208" y2="508" stroke="#fdba74" stroke-width="2"/>
  <text class="small" x="972" y="535">Provider/outlet scoped</text>
  <text class="small" x="972" y="558">Evidence + benign context</text>
  <text class="small" x="972" y="581">No combined risk score</text>

  <path class="arrow" d="M590 525 L650 387"/>
  <path class="arrow" d="M775 445 L775 475"/>
  <path class="arrow" d="M900 387 L950 405"/>

  <rect class="flow" x="650" y="665" rx="10" width="580" height="135"/>
  <text class="h" x="672" y="701">Explainable alert → provider-aware case</text>
  <text class="t" x="672" y="732">Immutable sources and localized explanation</text>
  <text class="t" x="672" y="758">Route · own · acknowledge · escalate · review · resolve</text>
  <text class="small" x="672" y="782">Notification + append-only audit · retrieval-only similar cases</text>

  <path class="pink" d="M775 600 L775 665"/>
  <path class="pink" d="M1090 600 L1090 665"/>

  <rect class="panel" x="52" y="665" rx="10" width="500" height="135"/>
  <text class="h" x="74" y="701">PostgreSQL / Supabase</text>
  <text class="t" x="74" y="732">constraints · append-only triggers · current-state views</text>
  <text class="t" x="74" y="758">application authorization + RLS defense in depth</text>
  <text class="small" x="74" y="782">synthetic ledger · evidence · workflow · metrics</text>

  <path class="dash" d="M475 610 L380 665"/>
  <path class="dash" d="M650 730 L552 730"/>

  <rect x="52" y="835" width="1288" height="1" fill="#cbd5e1"/>
  <text class="small" x="52" y="866">Security boundary: browser never receives database service credentials; provider-confidential reads are denied by API policy and PostgreSQL RLS.</text>
</svg>
