# Replace this with the organization key shown in SonarQube Cloud.
sonar.organization=a-piyas-04

# This must exactly match the project key shown in SonarQube Cloud.
sonar.projectKey=A-Piyas-04_SUST-hackathon-onsite
sonar.projectName=SUST Hackathon Onsite
sonar.sourceEncoding=UTF-8

# Analyze both applications as one SonarQube project.
# NOTE: backend/analytics has no committed Python sources yet (only gitignored
# bytecode), so it is absent in a fresh checkout. Re-add it here once the
# analytics package lands, or the scanner fails with "folder does not exist".
sonar.sources=frontend/src,backend/app,backend/migrations
sonar.tests=backend/tests
sonar.test.inclusions=backend/tests/**/*.py

# Generated, vendored, cache, and test files are not production source.
sonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/build/**,**/__pycache__/**,**/.pytest_cache/**,**/coverage/**,**/*.min.js,frontend/src/app/favicon.ico
# Dev tooling entry points (CLI, codegen) are not runtime code, like migrations.
# frontend/src is excluded from COVERAGE only (issues/security are still
# analyzed there): the frontend has no unit-test runner yet, so every line
# would count as uncovered. Remove the exclusion once vitest + lcov exist
# (then also enable sonar.javascript.lcov.reportPaths below).
sonar.coverage.exclusions=backend/migrations/**,backend/app/scripts/**,frontend/src/**
sonar.cpd.exclusions=backend/migrations/**

# pytest-cov generates this before the scan.
sonar.python.coverage.reportPaths=backend/coverage.xml

# Issue suppressions (analysis scope).
# Dev tooling in backend/app/scripts generates DETERMINISTIC synthetic demo data
# using the standard `random` module seeded from a fixed master seed. That is not
# security-sensitive randomness, so the "insecure pseudorandom generator" rule
# (python:S2245) is a false positive there. Suppress it for scripts only —
# runtime code (backend/app/services, etc.) is still fully analyzed.
sonar.issue.ignore.multicriteria=r1,r2
sonar.issue.ignore.multicriteria.r1.ruleKey=python:S2245
sonar.issue.ignore.multicriteria.r1.resourceKey=backend/app/scripts/**
# S8707 (path injection): ConfidenceCalibrationModel.save/try_load accept an
# OPTIONAL path that defaults to a fixed config constant and is only ever
# overridden by the offline calibration-training CLI (operator input) and tests —
# never by web/request input. The artifact is model state written during offline
# training, not a user-reachable sink. Suppress this taint rule for that file only.
sonar.issue.ignore.multicriteria.r2.ruleKey=pythonsecurity:S8707
sonar.issue.ignore.multicriteria.r2.resourceKey=backend/app/services/quality/calibration.py

# When frontend tests are added, generate frontend/coverage/lcov.info and enable:
# sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
