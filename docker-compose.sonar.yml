services:
  sonarqube:
    image: sonarqube:26.7.0.124771-community
    container_name: sust_sonarqube
    depends_on:
      sonar-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/${SONAR_DB_NAME:-sonarqube}
      SONAR_JDBC_USERNAME: ${SONAR_DB_USER:-sonarqube}
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD}
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    restart: unless-stopped

  sonar-db:
    image: postgres:16-alpine
    container_name: sust_sonarqube_db
    environment:
      POSTGRES_DB: ${SONAR_DB_NAME:-sonarqube}
      POSTGRES_USER: ${SONAR_DB_USER:-sonarqube}
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD}
    volumes:
      - sonarqube_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SONAR_DB_USER:-sonarqube} -d ${SONAR_DB_NAME:-sonarqube}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonarqube_db:
