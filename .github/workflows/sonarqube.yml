name: SonarQube Cloud

on:
  push:
    branches:
      - main
      - master
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze and enforce quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Ephemeral Postgres for the backend schema/RLS/view suite. The migrations
    # shim auth.users/auth.uid() and the anon/authenticated/service_role roles
    # when absent (ADR 0002/0004), so the chain applies on plain PostgreSQL.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run backend tests with coverage
        working-directory: backend
        shell: bash
        env:
          # Direct 5432 connection to the service container above. No sslmode
          # (libpq's default `prefer` falls back to plaintext for local PG).
          # TEST_DATABASE_URL is the master knob: the app/phase3 conftests
          # rewrite DIRECT_DATABASE_URL from it at import time, so both must
          # point at the same database.
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: |
          test_file="$(find tests -type f -name 'test_*.py' -print -quit 2>/dev/null)"
          if [[ -n "$test_file" ]]; then
            pytest --cov=app --cov-report=xml:coverage.xml
          else
            echo "No backend tests exist yet; skipping Python coverage generation."
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run SonarQube Cloud analysis
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Enforce SonarQube Cloud quality gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
